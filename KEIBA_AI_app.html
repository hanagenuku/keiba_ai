<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KEIBA-AI">
<meta name="theme-color" content="#0a2e1a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a2e1a'/><text y='70' x='10' font-size='60'>🏇</text></svg>">
<title>KEIBA-AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#0a2e1a;--g2:#1a5c34;--g3:#2d8a52;
  --gold:#c9a84c;--gold2:#e8c87a;
  --red:#c0392b;--blue:#1a5276;
  --bg:#f2efe8;--card:#fff;
  --text:#1a1a1a;--sub:#777;--border:#e0dbd0;
  --rec-border:#c9a84c;
}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
.hdr{background:var(--g1);padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo{font-size:22px;font-weight:900;letter-spacing:3px;color:var(--gold2)}
.hdr-sub{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-top:1px}
.hdr-right{text-align:right}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.85);font-weight:600}
.hdr-venues{font-size:10px;color:var(--gold);margin-top:2px}

/* BIAS BAR */
.bias{background:var(--g2);padding:5px 16px;display:flex;justify-content:space-between;align-items:center}
.bias-txt{font-size:11px;color:rgba(255,255,255,0.75)}
.bias-tag{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px}

/* VENUE TABS */
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;position:sticky;top:56px;z-index:199;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 22px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--sub);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab.on{background:var(--g1);color:#fff;border-color:var(--g1)}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 10px 4px}
.sum-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:8px 10px;text-align:center}
.sum-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sum-val{font-size:16px;font-weight:900;color:var(--g1);margin-top:2px}
.sum-val.gold{color:var(--gold)}

/* RACE LIST */
.list{padding:8px 10px 90px}

/* RACE CARD */
.rc{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s}
.rc.rec{border:2px solid var(--gold)}
.rc-head{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.rc-num{width:32px;height:32px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--sub);flex-shrink:0}
.rc.rec .rc-num{background:var(--gold);color:#fff}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-meta{font-size:11px;color:var(--sub);margin-top:2px}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.conf{background:var(--gold);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px}
.rec-lbl{font-size:10px;color:var(--gold);font-weight:700}
.arr{font-size:11px;color:var(--sub);transition:transform .2s;display:inline-block}
.arr.open{transform:rotate(180deg)}

/* HONMEI STRIP */
.hstrip{padding:0 14px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.hbadge{background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;flex-shrink:0}
.hname{font-size:13px;font-weight:700}
.hodds{font-size:12px;color:var(--sub);margin-left:auto}

/* DETAIL */
.detail{display:none;border-top:1px solid var(--border)}
.detail.open{display:block}
.det-inner{padding:12px 14px;background:#faf8f3}
.sec{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* HORSE TABLE */
.htbl{width:100%;font-size:11px;border-collapse:collapse}
.htbl th{color:var(--sub);font-weight:600;padding:3px 4px;text-align:left;border-bottom:1px solid var(--border);font-size:10px}
.htbl td{padding:6px 4px;border-bottom:1px solid #f0ece4;vertical-align:middle}
.htbl tr.hl td{background:rgba(201,168,76,0.07);font-weight:700}
.sbar{display:inline-flex;align-items:center;gap:4px}
.sbg{width:36px;height:5px;background:#e8e4dc;border-radius:3px;overflow:hidden;flex-shrink:0}
.sfl{height:100%;border-radius:3px;background:var(--gold)}
.popbadge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.pop1{background:#c0392b;color:#fff}
.pop2{background:#e67e22;color:#fff}
.pop3{background:#f39c12;color:#fff}
.popn{background:#eee;color:#666}

/* BETS */
.bets{margin-top:10px}
.bet{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border-radius:8px;margin-bottom:4px;border:1px solid var(--border)}
.btype{font-size:10px;font-weight:800;color:#fff;padding:2px 7px;border-radius:4px;flex-shrink:0}
.btype.fuku{background:var(--g2)}
.btype.tan{background:var(--red)}
.btype.wide{background:var(--blue)}
.bhorse{font-size:12px;font-weight:600;flex:1}
.best{font-size:10px;color:var(--sub)}
.bamt{font-size:13px;font-weight:800;color:var(--g1);margin-left:auto;flex-shrink:0}

/* COMMENT */
.cmt{margin-top:10px;padding:9px 12px;background:rgba(10,46,26,0.05);border-left:3px solid var(--g2);border-radius:0 8px 8px 0;font-size:12px;color:#444;line-height:1.7}

/* BOTTOM BAR */
.btm{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--g1);padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));display:flex;justify-content:space-around;z-index:200;border-top:1px solid rgba(255,255,255,0.1)}
.btm-item{text-align:center}
.btm-lbl{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase}
.btm-val{font-size:15px;font-weight:900;color:var(--gold2)}

/* PWA HINT */
.pwa{background:rgba(201,168,76,0.12);border:1px solid var(--gold);border-radius:10px;margin:8px 10px;padding:9px 14px;font-size:12px;color:#5a4010;display:flex;align-items:center;gap:8px}
.pwa button{margin-left:auto;background:var(--gold);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
</style>
</head>

// ═══════════════════════════════════════════════
// アプリロジック
// ═══════════════════════════════════════════════
let venue = D.venues[0];
const opened = {};

function popClass(pop){
  if(pop===1) return 'pop1';
  if(pop===2) return 'pop2';
  if(pop===3) return 'pop3';
  return 'popn';
}

function sbar(score){
  const p = Math.round(score/10*100);
  return `<span class="sbar"><span class="sbg"><span class="sfl" style="width:${p}%"></span></span><span style="font-size:10px;color:var(--sub)">${score.toFixed(1)}</span></span>`;
}

function toggle(k){
  opened[k]=!opened[k];
  render();
}

function switchVenue(v,btn){
  venue=v;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const races = D.races[venue]||[];
  let html='';
  for(const race of races){
    const k = venue+race.r;
    const isOpen = opened[k];
    const isRec = race.rec;
    html += `<div class="rc${isRec?' rec':''}">
      <div class="rc-head" onclick="toggle('${k}')">
        <div class="rc-num">${race.r}</div>
        <div class="rc-info">
          <div class="rc-name">${race.name}</div>
          <div class="rc-meta">${race.dist} · ${race.time}発走</div>
        </div>
        <div class="rc-right">
          ${isRec?`<span class="conf">AI ${race.conf}%</span><span class="rec-lbl">★推奨</span>`:''}
          <span class="arr${isOpen?' open':''}">▼</span>
        </div>
      </div>`;

    if(race.honmei){
      html+=`<div class="hstrip" onclick="toggle('${k}')">
        <span class="hbadge">◎本命</span>
        <span class="hname">#${race.honmei.n} ${race.honmei.name}</span>
        <span class="hodds">${race.honmei.odds}倍 / ${race.honmei.style}</span>
      </div>`;
    }

    if(isOpen){
      html+=`<div class="detail open"><div class="det-inner">
        <div class="sec">出走馬・スコア</div>
        <table class="htbl">
          <tr><th>馬番</th><th>馬名</th><th>人気</th><th>オッズ</th><th>スコア</th><th>脚質</th></tr>`;
      for(const h of race.horses){
        const isH = race.honmei && h.n===race.honmei.n;
        html+=`<tr${isH?' class="hl"':''}>
          <td>${isH?'◎':''}${h.n}</td>
          <td>${h.name}</td>
          <td><span class="popbadge ${popClass(h.pop)}">${h.pop}番人気</span></td>
          <td>${h.odds}倍</td>
          <td>${sbar(h.score)}</td>
          <td>${h.style}</td>
        </tr>`;
      }
      html+=`</table>
        <div class="bets"><div class="sec" style="margin-top:12px">買い目</div>`;
      for(const b of race.bets){
        html+=`<div class="bet">
          <span class="btype ${b.tag}">${b.label}</span>
          <span class="bhorse">${b.horse}</span>
          <span class="best">${b.est}</span>
          <span class="bamt">${b.amt}</span>
        </div>`;
      }
      html+=`</div><div class="cmt">${race.cmt}</div></div></div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('race-list').innerHTML=html;
}

function init(){
  document.getElementById('hdate').textContent = D.date;
  document.getElementById('hvenues').textContent = D.venues.join(' · ');
  document.getElementById('bias-txt').textContent = D.bias.txt;
  document.getElementById('bias-tag').textContent = D.bias.tag;
  document.getElementById('b-inv').textContent = '¥'+D.stats.invest.toLocaleString();
  document.getElementById('b-rec').textContent = D.stats.rec+'R';
  document.getElementById('b-roi').textContent = '~'+D.stats.roi+'%';

  // サマリーカード
  const recCount = Object.values(D.races).flat().filter(r=>r.rec).length;
  const allCount = Object.values(D.races).flat().length;
  document.getElementById('summary').innerHTML=`
    <div class="sum-card"><div class="sum-label">全レース</div><div class="sum-val">${allCount}R</div></div>
    <div class="sum-card"><div class="sum-label">推奨レース</div><div class="sum-val gold">${recCount}R</div></div>
    <div class="sum-card"><div class="sum-label">推定投資</div><div class="sum-val">¥${D.stats.invest.toLocaleString()}</div></div>
  `;

  // 会場タブ（動的生成・3会場対応）
  const tabs = document.getElementById('tabs');
  tabs.innerHTML='';
  D.venues.forEach((v,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===0?' on':'');
    btn.textContent=v;
    btn.onclick=()=>switchVenue(v,btn);
    tabs.appendChild(btn);
  });

  // iOS PWAヒント
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS && !window.navigator.standalone){
    document.getElementById('pwa-hint').style.display='flex';
  }

  render();
}

init();
</script>
