name: Friday Prediction

on:
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download DB files via LFS
        run: git lfs pull --include="data/*.db"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python scripts/friday_predict.py

      - name: Commit & Push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.db data/keiba.db
          git diff --cached --quiet || git commit -m "auto: Friday prediction $(date +%Y%m%d)"
          git checkout -- . || true
          git pull --rebase origin main
          git push
