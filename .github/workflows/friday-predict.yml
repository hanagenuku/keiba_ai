name: Friday Prediction

on:
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python scripts/friday_predict.py

      - name: Commit & Push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout HEAD -- data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl data/horse_features.csv 2>/dev/null || true

          # 生成物を退避してから常にmain最新の上に上書きコミットする方式にする。
          # data/*.dbはバイナリでgitが自動マージできないため、旧来のpull --rebaseは
          # 実行中(数分〜十数分かかる)に他の変更がmainにpushされるとコンフリクトして
          # 失敗する既知の問題があった（2026-07-24調査で判明）。
          BACKUP_DIR=$(mktemp -d)
          for f in data/latest.json data/history.db data/keiba.db; do
            [ -f "$f" ] && cp "$f" "$BACKUP_DIR/$(basename "$f")"
          done

          export GIT_LFS_SKIP_SMUDGE=1
          PUSHED=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in latest.json history.db keiba.db; do
              [ -f "$BACKUP_DIR/$f" ] && cp "$BACKUP_DIR/$f" "data/$f"
            done
            for f in data/latest.json data/history.db data/keiba.db; do
              [ -f "$f" ] && git add "$f"
            done
            if git diff --cached --quiet; then
              echo "変更なし（既に反映済み）"
              PUSHED=1
              break
            fi
            git commit -m "auto: Friday prediction $(date +%Y%m%d)"
            if git push; then
              PUSHED=1
              break
            fi
            echo "⚠ push失敗、mainの最新を取り直してリトライ ($i/5)"
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::error::5回リトライしてもpushできませんでした"
            exit 1
          fi

      - name: Write status (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]" || true
          git config user.email "github-actions[bot]@users.noreply.github.com" || true
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          export GIT_LFS_SKIP_SMUDGE=1
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            git reset --hard origin/main || true
            echo "{\"status\":\"$STATUS\",\"workflow\":\"friday-predict\",\"updated_at\":\"$TS\"}" > data/workflow_status.json
            git add data/workflow_status.json
            git diff --cached --quiet && break
            git commit -m "auto: workflow status $STATUS $TS" || true
            git push && break
            echo "⚠ status push失敗、リトライ ($i/5)"
            sleep $((i * 5))
          done

  deploy:
    needs: predict
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest)
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: false

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp .nojekyll _site/
          mkdir -p _site/data
          for f in latest.json stats.json workflow_status.json note_schema.json course_profiles.json; do
            [ -f "data/$f" ] && cp "data/$f" "_site/data/$f"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
