name: Monthly Model Retrain

on:
  schedule:
    - cron: '0 18 1 * *'  # 毎月1日 03:00 JST
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly retrain
        run: python scripts/monthly_retrain.py

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 生成物を退避してから常にmain最新の上に上書きコミットする方式にする。
          # モデルファイルはバイナリでgitが自動マージできないため、旧来のpull --rebaseは
          # 実行中に他の変更がmainにpushされるとコンフリクトして失敗する既知の問題があった
          # （2026-07-24調査で判明、friday-predict等と同じ手口で修正）。
          BACKUP_DIR=$(mktemp -d)
          for f in data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl \
                   data/xgb_feature_cols.json data/horse_features.csv; do
            [ -f "$f" ] && cp "$f" "$BACKUP_DIR/$(basename "$f")"
          done

          export GIT_LFS_SKIP_SMUDGE=1
          PUSHED=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in xgb_fukusho_model.pkl xgb_calibrator.pkl xgb_feature_cols.json horse_features.csv; do
              [ -f "$BACKUP_DIR/$f" ] && cp "$BACKUP_DIR/$f" "data/$f"
            done
            for f in data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl \
                     data/xgb_feature_cols.json data/horse_features.csv; do
              [ -f "$f" ] && git add "$f"
            done
            if git diff --cached --quiet; then
              echo "変更なし（既に反映済み）"
              PUSHED=1
              break
            fi
            git commit -m "auto: monthly retrain $(date +%Y%m)"
            if git push; then
              PUSHED=1
              break
            fi
            echo "⚠ push失敗、mainの最新を取り直してリトライ ($i/5)"
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::error::5回リトライしてもpushできませんでした"
            exit 1
          fi
