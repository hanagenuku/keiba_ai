name: Monthly Model Retrain

on:
  schedule:
    - cron: '0 18 1 * *'  # 毎月1日 03:00 JST
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly retrain
        run: python scripts/monthly_retrain.py

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl \
                  data/xgb_feature_cols.json data/horse_features.csv || true
          git diff --cached --quiet || git commit -m "auto: monthly retrain $(date +%Y%m)"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase origin main
          git push
