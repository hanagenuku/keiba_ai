name: Weekend (Results + Prediction)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'saturday or sunday'
        required: true
        default: 'saturday'
        type: choice
        options:
          - saturday
          - sunday

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekend script
        run: python scripts/weekend.py --mode ${{ inputs.mode }}

      - name: Generate stats
        run: python scripts/generate_stats.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout HEAD -- data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl data/horse_features.csv 2>/dev/null || true
          git add data/
          git diff --cached --quiet || git commit -m "auto: Weekend ${{ inputs.mode }} $(date +%Y%m%d)"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase --autostash origin main
          git push

      - name: Write status (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]" || true
          git config user.email "github-actions[bot]@users.noreply.github.com" || true
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"status\":\"$STATUS\",\"workflow\":\"weekend\",\"updated_at\":\"$TS\"}" > data/workflow_status.json
          git add data/workflow_status.json
          git diff --cached --quiet || git commit -m "auto: workflow status $STATUS $TS"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase --autostash origin main || true
          git push || true
