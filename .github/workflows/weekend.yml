name: Weekend (Results + Prediction)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'saturday or sunday'
        required: true
        default: 'saturday'
        type: choice
        options:
          - saturday
          - sunday

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekend script
        run: python scripts/weekend.py --mode ${{ inputs.mode }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "auto: Weekend ${{ inputs.mode }} $(date +%Y%m%d)"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase origin main
          git push
