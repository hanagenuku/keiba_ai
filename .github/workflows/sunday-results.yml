name: Sunday Results

on:
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  results:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Sunday results
        run: python scripts/sunday_results.py

      - name: Ingest pre-race odds log
        run: python scripts/ingest_odds_log.py
        env:
          GAS_URL: ${{ secrets.GAS_URL }}

      - name: Ingest race notes log
        run: python scripts/ingest_notes_log.py
        env:
          GAS_URL: ${{ secrets.GAS_URL }}

      - name: Generate stats
        run: python scripts/generate_stats.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout HEAD -- data/xgb_fukusho_model.pkl data/xgb_calibrator.pkl data/horse_features.csv 2>/dev/null || true
          git add data/
          git diff --cached --quiet || git commit -m "auto: Sunday results $(date +%Y%m%d)"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase --autostash origin main
          git push

      - name: Write status (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]" || true
          git config user.email "github-actions[bot]@users.noreply.github.com" || true
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"status\":\"$STATUS\",\"workflow\":\"sunday-results\",\"updated_at\":\"$TS\"}" > data/workflow_status.json
          git add data/workflow_status.json
          git diff --cached --quiet || git commit -m "auto: workflow status $STATUS $TS"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase --autostash origin main || true
          git push || true

  deploy:
    needs: results
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest)
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: false

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp .nojekyll _site/
          mkdir -p _site/data
          for f in latest.json stats.json workflow_status.json note_schema.json course_profiles.json; do
            [ -f "data/$f" ] && cp "data/$f" "_site/data/$f"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
