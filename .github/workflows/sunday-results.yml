name: Sunday Results

on:
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download required files via LFS
        run: git lfs pull --include="data/*.db,data/*.pkl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Sunday results
        run: python scripts/sunday_results.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "auto: Sunday results $(date +%Y%m%d)"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase origin main
          git push

      - name: Write status (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]" || true
          git config user.email "github-actions[bot]@users.noreply.github.com" || true
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"status\":\"$STATUS\",\"workflow\":\"sunday-results\",\"updated_at\":\"$TS\"}" > data/workflow_status.json
          git add data/workflow_status.json
          git diff --cached --quiet || git commit -m "auto: workflow status $STATUS $TS"
          GIT_LFS_SKIP_SMUDGE=1 git pull --rebase origin main || true
          git push || true
