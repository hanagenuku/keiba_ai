name: Sunday Results

on:
  workflow_dispatch:

concurrency:
  group: keiba-weekly
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Sunday results
        run: python scripts/sunday_results.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "auto: Sunday results $(date +%Y%m%d)"
          git pull --rebase origin main
          git push
