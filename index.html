<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="直馬">
<meta name="theme-color" content="#0a2e1a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a2e1a'/><text y='62' x='50' font-size='58' text-anchor='middle'>🏇</text><text y='90' x='50' font-size='18' font-weight='bold' text-anchor='middle' fill='%23c9a84c' font-family='sans-serif'>直馬</text></svg>">
<title>KEIBA-AI v7</title><!-- build:20260620-1200 -->
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#0a2e1a;--g2:#1a5c34;--g3:#2d8a52;
  --gold:#c9a84c;--gold2:#e8c87a;
  --red:#c0392b;--blue:#1a5276;
  --bg:#f2efe8;--card:#fff;
  --text:#1a1a1a;--sub:#777;--border:#e0dbd0;
}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;position:relative}
.hdr{background:var(--g1);padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo{font-size:22px;font-weight:900;letter-spacing:3px;color:var(--gold2)}
.hdr-sub{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-top:1px}
.hdr-right{text-align:right}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.85);font-weight:600}
.hdr-venues{font-size:10px;color:var(--gold);margin-top:2px}
.bias{background:var(--g2);padding:5px 16px;display:flex;justify-content:space-between;align-items:center}
.bias-txt{font-size:11px;color:rgba(255,255,255,0.75)}
.bias-tag{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;position:sticky;top:56px;z-index:199;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 22px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--sub);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 10px 4px}
.sum-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:8px 10px;text-align:center}
.sum-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sum-val{font-size:16px;font-weight:900;color:var(--g1);margin-top:2px}
.sum-val.gold{color:var(--gold)}
.list{padding:8px 10px 90px}
.rc{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.rc.rec{border:2px solid var(--gold)}
.rc-head{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.rc-num{width:32px;height:32px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--sub);flex-shrink:0}
.rc.rec .rc-num{background:var(--gold);color:#fff}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-meta{font-size:11px;color:var(--sub);margin-top:2px}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.conf{background:var(--gold);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px}
.rec-lbl{font-size:10px;color:var(--gold);font-weight:700}
.arr{font-size:11px;color:var(--sub);transition:transform .2s;display:inline-block}
.arr.open{transform:rotate(180deg)}
.hstrip{padding:0 14px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.hbadge{background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;flex-shrink:0}
.hname{font-size:13px;font-weight:700}
.hodds{font-size:12px;color:var(--sub);margin-left:auto}
.detail{display:none;border-top:1px solid var(--border)}
.detail.open{display:block}
.det-inner{padding:12px 14px;background:#faf8f3}
.sec{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
/* ★ 新テーブル */
.htbl{width:100%;font-size:11px;border-collapse:collapse}
.htbl th{font-weight:700;padding:4px 3px;text-align:center;border-bottom:2px solid #ddd;font-size:10px;color:#fff;background:var(--g1)}
.htbl th.col-name{text-align:left;background:#2d6a4f}
.htbl th.col-rl{background:#e67e22}
.htbl th.col-mk{background:#555;width:26px}
.htbl td{padding:5px 3px;border-bottom:1px solid #f0ece4;vertical-align:middle;text-align:center}
.htbl td.col-name{text-align:left;font-weight:600;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.htbl tr.hl td{background:rgba(201,168,76,0.10);font-weight:700}
.htbl td.col-rl{font-weight:800;color:#c0450a}
.htbl td.phi{color:#c0392b;font-weight:800}
.htbl td.plo{color:var(--g2);font-weight:600}
/* 人気列 */
.htbl th.col-pop{background:#34495e;width:22px}
.htbl td.col-pop{font-weight:700;color:#555;font-size:10px}
/* オッズ列 */
.htbl th.col-odds{background:#2c3e50}
.htbl td.col-odds{font-size:10px;color:#666}
/* バリュー列 */
.htbl th.col-val{background:#117a65}
/* バリューバッジ */
.val-buy{color:#fff;background:#27ae60;font-weight:800;font-size:10px;border-radius:3px}
.val-neutral{color:#27ae60;font-weight:600;font-size:10px}
.val-over{color:#999;font-size:10px}
.val-none{color:#ccc;font-size:10px}
.mk{display:inline-block;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:800;line-height:1.5}
.mk-推{background:#8e44ad;color:#fff}
.mk-高{background:#27ae60;color:#fff}
.mk-穴{background:#e67e22;color:#fff}
/* ベット・コメント */
.bets{margin-top:10px}
.bet{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border-radius:8px;margin-bottom:4px;border:1px solid var(--border)}
.btype{font-size:10px;font-weight:800;color:#fff;padding:2px 7px;border-radius:4px;flex-shrink:0}
.btype.fuku{background:var(--g2)}.btype.tan{background:var(--red)}.btype.wide{background:var(--blue)}
.btype.umaren{background:#6c3483}.btype.sanfuku{background:#117a65}.btype.santan{background:#b7950b}
.bhorse{font-size:12px;font-weight:600;flex:1}
.best{font-size:10px;color:var(--sub)}
.bamt{font-size:13px;font-weight:800;color:var(--g1);margin-left:auto;flex-shrink:0}
.cmt{margin-top:10px;padding:9px 12px;background:rgba(10,46,26,0.05);border-left:3px solid var(--g2);border-radius:0 8px 8px 0;font-size:12px;color:#444;line-height:1.7;white-space:pre-line}
/* 三連複フォーメーション */
.formation-box{background:rgba(26,92,58,0.05);border:1px solid rgba(26,92,58,0.2);border-radius:8px;padding:10px 14px;margin:8px 0}
.formation-title{font-size:12px;font-weight:700;color:#1a5c3a;margin-bottom:6px}
.formation-row{font-size:11px;padding:3px 0;display:flex;align-items:flex-start;gap:6px}
.row-label{display:inline-block;min-width:30px;font-size:10px;font-weight:700;color:#fff;text-align:center;border-radius:3px;padding:1px 4px;flex-shrink:0}
.axis-label{background:#c0392b}
.second-label{background:#e67e22}
.third-label{background:#2980b9}
.axis-horse{font-weight:700}
.formation-payout{font-size:10px;color:#666;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd}
.result-banner{margin:8px 10px;padding:10px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.result-banner.hit{border-color:#27ae60}
.rb-title{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px}
.rb-stats{font-size:14px;font-weight:800;color:var(--g1)}
.rb-roi{font-size:12px;color:var(--sub);margin-top:2px}
.loading{text-align:center;padding:60px 20px;color:var(--sub)}
.loading-spin{font-size:36px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:16px;padding:16px;background:#fff3f3;border:1px solid #e74c3c;border-radius:10px;font-size:13px;color:#c0392b;line-height:1.6}
.btm{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--g1);padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));display:flex;justify-content:space-around;z-index:200;border-top:1px solid rgba(255,255,255,0.1)}
.btm-item{text-align:center}
.btm-lbl{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase}
.btm-val{font-size:15px;font-weight:900;color:var(--gold2)}
.reload-btn{display:block;margin:8px 10px;padding:10px;background:var(--g1);color:var(--gold2);border:none;border-radius:10px;font-size:13px;font-weight:700;width:calc(100% - 20px);cursor:pointer;letter-spacing:1px}
.pwa{background:rgba(201,168,76,0.12);border:1px solid var(--gold);border-radius:10px;margin:8px 10px;padding:9px 14px;font-size:12px;color:#5a4010;display:flex;align-items:center;gap:8px}
.pwa button{margin-left:auto;background:var(--gold);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.odds-btn{background:#2c3e50;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer}
.odds-btn:active{background:#1a252f}
.odds-btn:disabled{background:#95a5a6}
.odds-time{font-size:10px;color:#888;margin-left:8px}
.note-btn{background:#8e44ad;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px}
.note-btn:active{background:#6c3483}
.note-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.note-modal{background:#fff;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-radius:14px 14px 0 0;padding:16px}
.note-modal h3{margin:0 0 10px;font-size:15px}
.note-sel{width:100%;padding:9px;font-size:14px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px}
.note-row{margin-bottom:12px}
.note-row > label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px}
.note-options{display:flex;gap:6px;flex-wrap:wrap}
.note-options .opt{flex:1;min-width:56px}
.note-options .opt input{display:none}
.note-options .opt span{display:block;text-align:center;padding:8px 4px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fafafa}
.note-options .opt input:checked + span{background:#8e44ad;color:#fff;border-color:#8e44ad;font-weight:700}
.note-memo{width:100%;min-height:48px;padding:8px;font-size:13px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.note-preview{font-size:13px;font-weight:700;color:#8e44ad;margin:10px 0;text-align:right}
.note-actions{display:flex;gap:8px;margin-top:6px}
.note-actions button{flex:1;padding:11px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer}
.note-save{background:#8e44ad;color:#fff}
.note-save:disabled{background:#b09cc4}
.note-cancel{background:#eee;color:#333}
.action-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:flex-start}
.action-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.action-btn{background:#1a5c3a;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;width:100%}
.action-btn:active{background:#0d3d25}
.action-btn:disabled{background:#95a5a6}
.action-sub{font-size:9px;color:#888;margin-top:3px;white-space:nowrap;pointer-events:none}
/* ナビ */
.nav-bar{display:flex;background:var(--g1);padding:0 12px;border-bottom:2px solid var(--gold)}
.nav-btn{flex:1;padding:8px 0;background:transparent;border:none;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;cursor:pointer}
.nav-btn.on{color:var(--gold2);border-bottom:2px solid var(--gold2)}
/* 成績ページ */
.stat-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.stat-title{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0ece4;font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-key{color:var(--sub)}
.stat-val{font-weight:700;color:var(--g1)}
.stat-val.pos{color:#27ae60}
.stat-val.neg{color:#c0392b}
/* ROIバー */
.roi-bar-wrap{margin:4px 0 2px;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.roi-bar{height:100%;border-radius:4px;background:var(--g2)}
.roi-bar.neg{background:#e74c3c}
/* RL精度グリッド */
.rl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px}
.rl-cell{background:#f8f6f0;border-radius:8px;padding:8px;text-align:center}
.rl-cell-label{font-size:10px;color:var(--sub);margin-bottom:2px}
.rl-cell-val{font-size:20px;font-weight:900;color:var(--g1)}
/* 直近レース表 */
.rtbl{width:100%;font-size:11px;border-collapse:collapse}
.rtbl th{background:var(--g1);color:#fff;padding:5px 3px;font-size:10px;font-weight:700}
.rtbl td{padding:4px 3px;border-bottom:1px solid #f0ece4;text-align:center}
.rtbl tr.hit td{background:rgba(39,174,96,0.08)}
.rtbl .miss{color:#bbb}
.hit-mark{color:#27ae60;font-weight:800}
.miss-mark{color:#e74c3c}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-logo">KEIBA-AI</div><div class="hdr-sub">AI RACING PREDICTION</div></div>
  <div class="hdr-right"><div class="hdr-date" id="hdate">読込中...</div><div class="hdr-venues" id="hvenues">---</div></div>
</div>
<div class="nav-bar">
  <button class="nav-btn on" id="nav-predict" onclick="switchPage('predict')">🏇 予想</button>
  <button class="nav-btn" id="nav-stats" onclick="switchPage('stats')">📊 成績</button>
</div>
<div class="action-bar">
  <div class="action-wrap">
    <button class="action-btn" onclick="triggerAction('friday-predict')">📅 土曜レース予想</button>
    <span class="action-sub">金曜夜〜土曜朝に実行</span>
  </div>
  <div class="action-wrap">
    <button class="action-btn" onclick="triggerAction('weekend','saturday')">📋 土曜結果取得＋日曜レース予想</button>
    <span class="action-sub">土曜夜に実行</span>
  </div>
  <div class="action-wrap">
    <button class="action-btn" onclick="triggerAction('sunday-results')">📋 日曜結果取得</button>
    <span class="action-sub">日曜夜に実行</span>
  </div>
</div>
<div class="bias"><span class="bias-txt" id="bias-txt">バイアス読込中...</span><span class="bias-tag" id="bias-tag">-</span></div>
<div class="tabs" id="tabs"></div>
<div id="pwa-hint" style="display:none" class="pwa">
  <span>📱 ホーム画面に追加して使えます（Safari→共有→ホーム画面に追加）</span>
  <button onclick="this.parentElement.style.display='none'">✕</button>
</div>
<div id="page-predict">
<div id="result-area"></div>
<div class="summary" id="summary"></div>
<div class="list" id="race-list"></div>
</div>
<div id="page-stats" style="display:none;padding:8px 10px 90px"></div>
<div class="btm">
  <div class="btm-item"><div class="btm-lbl">推定投資</div><div class="btm-val" id="b-inv">-</div></div>
  <div class="btm-item"><div class="btm-lbl">推奨レース</div><div class="btm-val" id="b-rec">-</div></div>
  <div class="btm-item"><div class="btm-lbl">ROI予測</div><div class="btm-val" id="b-roi">-</div></div>
</div>
<script>
const DATA_URL  = 'https://hanagenuku.github.io/keiba_ai/data/latest.json';
const DATA_URL_FALLBACK = 'https://raw.githubusercontent.com/hanagenuku/keiba_ai/main/data/latest.json';
const STATS_URL = 'https://hanagenuku.github.io/keiba_ai/data/stats.json';
const STATS_URL_FALLBACK = 'https://raw.githubusercontent.com/hanagenuku/keiba_ai/main/data/stats.json';
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxcpXYNxHPS4wFmnX-EOyWaTU8AKt1ZQhJAL6dz5sTeEWoR319EfCqqDB0B1NHTHAYW/exec';
const EV_BUY_THRESHOLD = 1.3;
const BET_AMOUNT_REN  = 500;
const BET_AMOUNT_WIDE = 300;
const BET_AMOUNT_FUKU = 500;
const BET_AMOUNT_SAN  = 200;
const EV_THRESHOLD = 1.5;
const TAG_MAP = {'複勝':'fuku','単勝':'tan','ワイド':'wide','馬連':'umaren','三連複':'sanfuku','三連単':'santan'};
let D = null;
let venue = null;
const opened = {};
const oddsCooldown = {};
async function loadData(preferRaw) {
  document.getElementById('race-list').innerHTML = '<div class="loading"><div class="loading-spin">🏇</div><div>予想データを読み込み中...</div></div>';
  if (!DATA_URL) { document.getElementById('hdate').textContent='未設定'; return; }
  const primary   = preferRaw ? DATA_URL_FALLBACK : DATA_URL;
  const secondary = preferRaw ? DATA_URL : DATA_URL_FALLBACK;
  const bustUrl = primary + '?t=' + Date.now();
  try {
    let res = await fetch(bustUrl, { cache: 'no-store' });
    if (!res.ok) {
      res = await fetch(secondary + '?t=' + Date.now(), { cache: 'no-store' });
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();
    initApp();
  } catch(e) {
    document.getElementById('race-list').innerHTML = '<div class="error-box">⚠️ <strong>データ読み込みエラー</strong><br><br>' + e.message + '<br><br><strong>確認事項:</strong><br>• Colabで予想生成を実行済みか<br><br><button class="reload-btn" onclick="loadData()" style="margin:8px 0 0">再読み込み</button></div>';
    document.getElementById('hdate').textContent = 'エラー';
  }
}

function initApp() {
  document.getElementById('hdate').textContent = D.date || '---';
  document.getElementById('hvenues').textContent = (D.venues||[]).join(' · ');
  document.getElementById('bias-txt').textContent = D.bias?.txt || 'フラット';
  document.getElementById('bias-tag').textContent = D.bias?.tag || '-';
  document.getElementById('b-inv').textContent = '¥'+(D.stats?.invest||0).toLocaleString();
  document.getElementById('b-rec').textContent = (D.stats?.rec||0)+'R';
  document.getElementById('b-roi').textContent = '~'+(D.stats?.roi||0)+'%';
  const ra = document.getElementById('result-area');
  if (D.result) {
    const r = D.result;
    ra.innerHTML = '<div class="result-banner '+(r.recovered>=r.invested?'hit':'')+'"><div class="rb-title">📊 前日の結果</div><div class="rb-stats">的中: '+r.hit+'/'+r.total+'点　回収: ¥'+(r.recovered||0).toLocaleString()+'</div><div class="rb-roi">投資: ¥'+(r.invested||0).toLocaleString()+'　ROI: '+r.roi+'%</div></div>';
  } else { ra.innerHTML=''; }
  const allRaces = Object.values(D.races||{}).flat();
  const recCount = allRaces.filter(r=>r.rec).length;
  document.getElementById('summary').innerHTML = '<div class="sum-card"><div class="sum-label">推奨レース</div><div class="sum-val gold">'+recCount+'R</div></div><div class="sum-card"><div class="sum-label">全会場</div><div class="sum-val">'+(D.venues||[]).length+'場</div></div><div class="sum-card"><div class="sum-label">推定投資</div><div class="sum-val">¥'+(D.stats?.invest||0).toLocaleString()+'</div></div>';
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  (D.venues||[]).forEach((v,i) => {
    const btn = document.createElement('button');
    btn.className = 'tab'+(i===0?' on':'');
    btn.textContent = v;
    btn.onclick = () => switchVenue(v, btn);
    tabs.appendChild(btn);
  });
  venue = (D.venues||[])[0] || null;
  render();
  if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone)
    document.getElementById('pwa-hint').style.display = 'flex';
}

function switchVenue(v, btn) {
  venue = v;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function toggle(k) { opened[k]=!opened[k]; render(); }

function mkBadge(m) {
  if (!m) return '';
  return '<span class="mk mk-'+m+'">'+m+'</span>';
}

function findRace(raceKey) {
  for (const v of Object.keys(D.races || {})) {
    for (const r of D.races[v]) {
      if (v + r.r === raceKey) return r;
    }
  }
  return null;
}

let _pollingTimer = null;
const _POLL_KEY = 'keiba_polling';

const STATUS_URL = 'https://hanagenuku.github.io/keiba_ai/data/workflow_status.json';
const STATUS_URL_FALLBACK = 'https://raw.githubusercontent.com/hanagenuku/keiba_ai/main/data/workflow_status.json';

async function _getLatestTimestamp() {
  try {
    // raw.githubusercontent.com はCDNキャッシュが短いのでポーリング時はこちらを優先
    let res = await fetch(DATA_URL_FALLBACK + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) res = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return null;
    const j = await res.json();
    return j.generated_at || j.date || null;
  } catch(_) { return null; }
}

async function _getWorkflowStatus(startTime) {
  try {
    // raw.githubusercontent.com はCDNキャッシュが短いのでポーリング時はこちらを優先
    let res = await fetch(STATUS_URL_FALLBACK + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) res = await fetch(STATUS_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return null;
    const j = await res.json();
    // 今回のトリガー後に書かれたステータスのみ有効
    const updatedAt = new Date(j.updated_at).getTime();
    if (updatedAt < startTime) return null;
    return j.status; // 'success' or 'failure'
  } catch(_) { return null; }
}

function _stopPolling(btn, origText) {
  clearInterval(_pollingTimer);
  _pollingTimer = null;
  localStorage.removeItem(_POLL_KEY);
  if (btn) { btn.textContent = origText; }
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
  _triggerGuard = false;
}

function _startPolling(btn, origText, baselineTs, startTime = Date.now()) {
  const MAX_WAIT = 35 * 60;
  const CHECK_INTERVAL = 30;

  // localStorage に保存（ページ再読み込み後も復元できるように）
  localStorage.setItem(_POLL_KEY, JSON.stringify({ baselineTs, startTime, origText }));

  _pollingTimer = setInterval(async () => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    btn.textContent = `実行中... ${mins}:${String(secs).padStart(2,'0')}`;

    if (elapsed % CHECK_INTERVAL < 2) { // 30秒ごとにチェック（±1秒の誤差許容）
      const [ts, wfStatus] = await Promise.all([
        _getLatestTimestamp(),
        _getWorkflowStatus(startTime),
      ]);

      if (wfStatus === 'failure') {
        _stopPolling(btn, origText);
        document.getElementById('race-list').innerHTML =
          '<div class="error-box">❌ <strong>実行中にエラーが発生しました</strong><br><br>' +
          'GitHub Actions でエラーが起きました。<br>' +
          '<a href="https://github.com/hanagenuku/keiba_ai/actions" target="_blank" style="color:#e74c3c">→ エラーログを確認する</a><br><br>' +
          '<button class="reload-btn" onclick="loadData()" style="margin:8px 0 0">再読み込み</button></div>';
        return;
      }

      if (wfStatus === 'success' || (ts && ts !== baselineTs)) {
        _stopPolling(btn, origText);
        await loadData(true);
        return;
      }
    }

    if (elapsed >= MAX_WAIT) {
      _stopPolling(btn, origText);
      alert('⚠️ 35分経過しましたが完了を確認できませんでした。\nページを手動で更新してください。');
    }
  }, 1000);
}

// ページ読み込み時に実行中のポーリングを復元
async function _restorePolling() {
  const saved = localStorage.getItem(_POLL_KEY);
  if (!saved) return;
  try {
    const { baselineTs, startTime, origText } = JSON.parse(saved);
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (elapsed >= 35 * 60) { localStorage.removeItem(_POLL_KEY); return; }

    // 既に完了しているか確認
    const ts = await _getLatestTimestamp();
    if (ts && ts !== baselineTs) {
      localStorage.removeItem(_POLL_KEY);
      await loadData();
      return;
    }

    // まだ実行中 → 押されたボタンを探して復元
    const btn = [...document.querySelectorAll('.action-btn')].find(b => b.textContent === origText)
              || document.querySelector('.action-btn');
    if (btn) {
      btn.disabled = true;
      _startPolling(btn, origText, baselineTs, startTime);
    }
  } catch(_) { localStorage.removeItem(_POLL_KEY); }
}

let _triggerGuard = false;
async function triggerAction(workflow, mode) {
  if (_triggerGuard) return;
  _triggerGuard = true;

  const btn = event.currentTarget || event.target.closest('.action-btn') || event.target;
  btn.disabled = true;
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
  const origText = btn.textContent;
  btn.textContent = '実行中... 0:00';

  const baselineTs = await _getLatestTimestamp();
  const startTime = Date.now();

  try {
    let url = GAS_URL + '?action=trigger&workflow=' + workflow;
    if (mode) url += '&mode=' + mode;

    const res = await fetch(url, {redirect:'follow'});
    const data = await res.json();

    if (data.status === 'ok') {
      _startPolling(btn, origText, baselineTs, startTime);
    } else {
      alert('❌ エラー: ' + (data.message || JSON.stringify(data)));
      btn.textContent = origText;
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
      _triggerGuard = false;
    }
  } catch(err) {
    alert('❌ 通信エラー: ' + err.message);
    btn.textContent = origText;
    document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
    _triggerGuard = false;
  }
}

async function fetchFreshOdds(raceKey, btn) {
  const now = Date.now();
  if (oddsCooldown[raceKey] && now - oddsCooldown[raceKey] < 5000) return;
  oddsCooldown[raceKey] = now;

  const race = findRace(raceKey);
  if (!race || !race.race_id) {
    alert('レースIDが見つかりません');
    return;
  }

  const origLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = '取得中...';

  try {
    let url = GAS_URL + '?action=getOdds&race_id=' + encodeURIComponent(race.race_id);
    if (race.odds_cn) url += '&cn=' + encodeURIComponent(race.odds_cn);
    let data;
    const res = await fetch(url, {redirect:'follow'});
    data = await res.json();

    if (data.status !== 'ok') throw new Error(data.message || 'オッズ取得失敗');
    if (!data.odds || Object.keys(data.odds).length === 0) throw new Error('オッズ未取得(cn='+race.odds_cn+')');

    if (!race._morning_bets) {
      race._morning_bets = JSON.parse(JSON.stringify(race.bets || []));
      race._morning_ev = {};
      for (const h of (race.horses || [])) {
        race._morning_ev[h.n] = h.ev;
        h._morning_odds = h.odds || null;
      }
    }
    if (!race._morning_gumbel) {
      const mg = JSON.parse(JSON.stringify(race.gumbel_bets || []));
      for (const b of mg) {
        if (!b._key) b._key = _synthKey(b);
      }
      race._morning_gumbel = mg;
    }

    updateOddsAndEV(race, data.odds || {});
    const rawBets = recalcBets(race);
    race._change_type = classifyChange(race._morning_bets, rawBets);

    const horsesMap = {};
    for (const h of (race.horses || [])) horsesMap[h.n] = h;
    race._new_bets_raw = rawBets;
    race.bets = rawBets.map(b => betToDisplay(b, horsesMap));
    race._update_time = data.updated_at;

    // Recalculate gumbel_bets with fresh odds
    const newGumbel = recalcGumbelBets(race);
    if (newGumbel) {
      race.gumbel_bets = diffGumbelBets(race._morning_gumbel, newGumbel);
      race._gumbel_updated = true;
    }

    redrawRace(raceKey, race);
  } catch (err) {
    alert('オッズ取得エラー: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = origLabel;
  }
}

function updateOddsAndEV(race, freshOdds) {
  for (const h of (race.horses || [])) {
    const od = freshOdds[String(h.n)];
    if (od && od.tansho) {
      h.odds = od.tansho;
      h.tansho_odds  = od.tansho;
    }
    if (od && od.fukusho) {
      h.fukusho_odds = od.fukusho;
    }
    h.ev = (h.odds && h.odds > 0 && h.tan_pct != null)
         ? Math.round((h.tan_pct / 100) * h.odds * 1000) / 1000
         : null;
  }
  const ranked = (race.horses || []).filter(h => h.odds != null && h.odds > 0);
  ranked.sort((a, b) => a.odds - b.odds);
  ranked.forEach((h, i) => { h.pop = i + 1; });
}

function _synthKey(b) {
  const tag = b.tag || '';
  if (tag === 'sanfuku') return 'sanfuku';
  const nums = (b.horse || '').match(/#(\d+)/g);
  if (nums) {
    const ns = nums.map(x => x.replace('#', '')).sort((a, b) => a - b).join('_');
    return tag + '_' + ns;
  }
  return tag + '_' + (b.label || '');
}

function recalcGumbelBets(race) {
  const horses = (race.horses || []);
  const hMap = {};
  for (const h of horses) hMap[h.n] = h;

  const hasOdds = horses.some(h => h.odds > 0 && h.tansho_odds > 0);
  if (!hasOdds) return null;

  const sorted = horses.slice()
    .filter(h => h.odds > 0)
    .sort((a, b) => (a.rl_rank || 99) - (b.rl_rank || 99));
  if (sorted.length < 2) return null;

  const result = [];

  // 単勝: RL1位, EV = cal_prob × tansho_odds
  const top = sorted[0];
  if (top.tansho_odds > 0) {
    const prob = (top.cal_prob || top.tan_pct / 100);
    const ev = Math.round(prob * top.tansho_odds * 100) / 100;
    if (ev >= 0.8) {
      result.push({
        tag: 'tan', label: '単勝',
        horse: '#' + top.n + ' ' + top.name,
        est: top.tansho_odds.toFixed(1) + '倍',
        ev: ev, prob: Math.round(prob * 1000) / 1000,
        amt: '¥500', _key: 'tan_' + top.n
      });
    }
  }

  // 複勝: RL上位で EV >= 0.8
  for (const h of sorted.slice(0, 3)) {
    const fo = h.fukusho_odds || (h.tansho_odds ? Math.round(h.tansho_odds * 0.344 * 10) / 10 : 0);
    if (fo <= 0) continue;
    const prob = (h.fuku_pct || 0) / 100;
    if (prob <= 0) continue;
    const ev = Math.round(prob * fo * 100) / 100;
    if (ev >= 0.8) {
      result.push({
        tag: 'fuku', label: '複勝',
        horse: '#' + h.n + ' ' + h.name,
        est: fo.toFixed(1) + '倍',
        ev: ev, prob: Math.round(prob * 1000) / 1000,
        amt: '¥500', _key: 'fuku_' + h.n
      });
    }
  }

  // 馬連: RL1×2, EV = prob × estimated_odds
  if (sorted.length >= 2) {
    const h1 = sorted[0], h2 = sorted[1];
    const o1 = h1.tansho_odds || h1.odds, o2 = h2.tansho_odds || h2.odds;
    if (o1 > 0 && o2 > 0) {
      const qOdds = Math.round(Math.max(2.0, Math.pow(o1 * o2, 0.5) * 0.75) * 10) / 10;
      const p1 = (h1.cal_prob || h1.tan_pct / 100);
      const p2 = (h2.cal_prob || h2.tan_pct / 100);
      const qProb = Math.round(p1 * p2 / Math.max(1e-9, 1 - p1) * 2 * 1000) / 1000;
      const ev = Math.round(qProb * qOdds * 100) / 100;
      if (ev >= 0.8) {
        result.push({
          tag: 'umaren', label: '馬連',
          horse: '#' + Math.min(h1.n, h2.n) + '-#' + Math.max(h1.n, h2.n),
          est: qOdds.toFixed(1) + '倍',
          ev: ev, prob: qProb,
          amt: '¥500', _key: 'umaren_' + [h1.n, h2.n].sort((a, b) => a - b).join('_')
        });
      }
    }
  }

  // 三連複: 軸1頭（複勝確率最上位）＋相手5〜6頭（複勝率+EVで絞る）
  if (sorted.length >= 3) {
    const MIN_FUKU_PCT = 8.0;
    const TRIO_MAX_PTS = 15;

    // 複勝確率順でソート → 軸は複勝確率最上位
    const byFuku = horses.slice()
      .filter(h => h.odds > 0 && (h.fuku_pct || 0) > 0)
      .sort((a, b) => (b.fuku_pct || 0) - (a.fuku_pct || 0));
    if (byFuku.length < 3) { /* skip */ } else {
    const axis = byFuku[0];

    // 相手候補: 複勝確率 >= 8% かつ EV基準（tansho_odds * cal_prob >= 0.5）
    const partners = byFuku.slice(1).filter(h => {
      if ((h.fuku_pct || 0) < MIN_FUKU_PCT) return false;
      const prob = (h.cal_prob || (h.tan_pct || 0) / 100);
      const odds = h.tansho_odds || h.odds || 0;
      return prob * odds >= 0.5;
    }).slice(0, 6);

    if (partners.length >= 2) {
      const combos = [];
      for (let i = 0; i < partners.length - 1; i++) {
        for (let j = i + 1; j < partners.length; j++) {
          const a = axis, b = partners[i], c = partners[j];
          const oa = a.tansho_odds || a.odds, ob = b.tansho_odds || b.odds, oc = c.tansho_odds || c.odds;
          if (oa <= 0 || ob <= 0 || oc <= 0) continue;
          const tOdds = Math.round(Math.max(3.0, Math.pow(oa * ob * oc, 0.33) * 0.80) * 10) / 10;
          const pa = (a.cal_prob || a.tan_pct / 100);
          const pb = (b.cal_prob || b.tan_pct / 100);
          const pc = (c.cal_prob || c.tan_pct / 100);
          const tProb = Math.round(pa * pb * pc * 6 / Math.pow(Math.max(1e-9, (1 - pa) * (1 - pb)), 1) * 10000) / 10000;
          const ev = Math.round(tProb * tOdds * 100) / 100;
          combos.push({
            nums: [a.n, b.n, c.n].sort((x, y) => x - y),
            odds: tOdds, prob: tProb, ev: ev
          });
        }
      }
      combos.sort((a, b) => b.ev - a.ev);
      const selected = combos.filter(c => c.ev >= 0.3).slice(0, TRIO_MAX_PTS);
      if (selected.length >= 1) {
        const allNums = [...new Set(selected.flatMap(c => c.nums))].sort((a, b) => a - b);
        const pts = selected.length;
        const avgEv = Math.round(selected.reduce((s, c) => s + c.ev, 0) / pts * 100) / 100;
        const minPay = Math.min(...selected.map(c => c.odds)) * 100;
        const maxPay = Math.max(...selected.map(c => c.odds)) * 100;
        const synOdds = Math.round(pts * 100 / selected.reduce((s, c) => s + 100 / (c.odds || 1), 0) * 10) / 10;
        const comboStrs = selected.map(c => c.nums.join('-'));

        // 軸1頭流しなので formation
        const others = allNums.filter(n => n !== axis.n);
        result.push({
          tag: 'sanfuku', label: '三連複(' + pts + '点)',
          trio_type: 'formation', legs: [[axis.n], others, others],
          nums: allNums, combos: comboStrs,
          est: '¥' + Math.round(minPay).toLocaleString() + '〜¥' + Math.round(maxPay).toLocaleString(),
          ev: avgEv, syn_odds: synOdds,
          amt: '¥' + (pts * 100),
          _key: 'sanfuku'
        });
      }
    }
    }
  }

  return result;
}

function diffGumbelBets(morning, fresh) {
  const oldByKey = {};
  for (const b of (morning || [])) {
    if (b._key) oldByKey[b._key] = b;
  }
  const newByKey = {};
  for (const b of fresh) {
    if (b._key) newByKey[b._key] = b;
  }
  const result = [];
  for (const b of fresh) {
    const old = oldByKey[b._key];
    if (old) {
      b._prev_ev = old.ev;
      const diff = b.ev - old.ev;
      if (Math.abs(diff) >= 0.01) {
        b._ev_change = diff > 0 ? 'up' : 'down';
      } else {
        b._ev_change = 'same';
      }
    } else {
      b._ev_change = 'new';
    }
    result.push(b);
  }
  for (const key of Object.keys(oldByKey)) {
    if (!newByKey[key]) {
      const removed = Object.assign({}, oldByKey[key]);
      removed._ev_change = 'removed';
      result.push(removed);
    }
  }
  return result;
}

function estimatePayout(bet, horsesMap) {
  const getOdds = (n) => {
    const h = horsesMap[n];
    if (!h) return null;
    return h.tansho_odds || h.odds || h.fukusho_odds || null;
  };

  if (bet.type === '複勝') {
    const h = horsesMap[bet.nums[0]];
    if (!h || !h.fukusho_odds) return null;
    return h.fukusho_odds * 100;
  }
  if (bet.type === '馬連') {
    const o1 = getOdds(bet.nums[0]);
    const o2 = getOdds(bet.nums[1]);
    if (!o1 || !o2) return null;
    return Math.max(200, Math.pow(o1 * o2, 0.5) * 75);
  }
  if (bet.type === 'ワイド') {
    const o1 = getOdds(bet.nums[0]);
    const o2 = getOdds(bet.nums[1]);
    if (!o1 || !o2) return null;
    return Math.max(150, Math.pow(o1 * o2, 0.5) * 45);
  }
  if (bet.type === '三連複') {
    const o1 = getOdds(bet.nums[0]);
    const o2 = getOdds(bet.nums[1]);
    const o3 = getOdds(bet.nums[2]);
    if (!o1 || !o2 || !o3) return null;
    return Math.max(300, Math.pow(o1 * o2 * o3, 0.33) * 80);
  }
  return null;
}

function recalcBets(race) {
  const horses = (race.horses || []).slice().sort((a, b) => ((a.rl_rank || 99) - (b.rl_rank || 99)));
  const numHorses = race.num_horses || horses.length;
  const chaosGrade = race.chaos_grade || 'B';
  const hasOdds = horses.some(h => h.fukusho_odds != null);

  const valueHorses = horses.filter(h => h.ev != null && h.ev >= 1.3);

  const top1 = horses[0];
  const top2 = horses[1];
  const top3 = horses[2];
  if (!top1) return [];

  const candidates = [];

  if (numHorses >= 14) {
    if (!top2) {
      candidates.push({type:'複勝', nums:[top1.n], amount:BET_AMOUNT_FUKU,
                 reason:`多頭数(${numHorses}頭)・馬連候補不足→複勝`});
    } else if (chaosGrade === 'C') {
      candidates.push({type:'馬連', nums:[top1.n, top2.n], amount:BET_AMOUNT_REN,
                 reason:`多頭数(${numHorses}頭)+混戦・馬連(RL1×2)`});
      if (top3) {
        candidates.push({type:'三連複', nums:[top1.n, top2.n, top3.n].sort((a,b)=>a-b), amount:BET_AMOUNT_SAN,
                   reason:`多頭数(${numHorses}頭)+混戦・三連複RL1〜3ボックス`});
      }
    } else {
      candidates.push({type:'馬連', nums:[top1.n, top2.n], amount:BET_AMOUNT_REN,
                 reason:`多頭数(${numHorses}頭)・馬連(RL1×2)`});
      candidates.push({type:'ワイド', nums:[top1.n, top2.n], amount:BET_AMOUNT_WIDE,
                 reason:`多頭数(${numHorses}頭)・ワイド(RL1×2)`});
    }
  } else if (numHorses <= 8) {
    if (!top2) {
      candidates.push({type:'複勝', nums:[top1.n], amount:BET_AMOUNT_FUKU,
                 reason:`少頭数(${numHorses}頭)・馬連候補不足→複勝`});
    } else {
      candidates.push({type:'馬連', nums:[top1.n, top2.n], amount:BET_AMOUNT_REN,
                 reason:`少頭数(${numHorses}頭)・馬連(RL1×2)`});
    }
  } else if (chaosGrade === 'A') {
    if (!top2) {
      candidates.push({type:'複勝', nums:[top1.n], amount:BET_AMOUNT_FUKU,
                 reason:`中頭数(${numHorses}頭)+堅い・馬連候補不足→複勝`});
    } else {
      candidates.push({type:'馬連', nums:[top1.n, top2.n], amount:BET_AMOUNT_REN,
                 reason:`中頭数(${numHorses}頭)+堅い・馬連(RL1×2)`});
    }
  } else if (chaosGrade === 'B') {
    if (valueHorses.length > 0) {
      const vh = valueHorses[0];
      candidates.push({type:'複勝', nums:[vh.n], amount:BET_AMOUNT_FUKU,
                 reason:`中頭数(${numHorses}頭)+中荒れ・バリュー馬#${vh.n}複勝`});
      if (vh.n !== top1.n) {
        candidates.push({type:'ワイド', nums:[vh.n, top1.n], amount:BET_AMOUNT_WIDE,
                   reason:`中頭数(${numHorses}頭)+中荒れ・バリュー#${vh.n}×RL1位#${top1.n}ワイド`});
      } else if (top2) {
        candidates.push({type:'ワイド', nums:[vh.n, top2.n], amount:BET_AMOUNT_WIDE,
                   reason:`中頭数(${numHorses}頭)+中荒れ・バリュー#${vh.n}×RL2位#${top2.n}ワイド`});
      }
    } else {
      candidates.push({type:'複勝', nums:[top1.n], amount:BET_AMOUNT_FUKU,
                 reason:`中頭数(${numHorses}頭)+中荒れ・バリューなし→RL1位複勝`});
    }
  } else {
    // chaosGrade === 'C'
    if (valueHorses.length > 0) {
      candidates.push({type:'複勝', nums:[valueHorses[0].n], amount:BET_AMOUNT_SAN,
                 reason:`中頭数(${numHorses}頭)+大荒れ・バリュー馬#${valueHorses[0].n}複勝少額`});
    }
  }

  if (!hasOdds) return candidates;

  const horsesMap = {};
  for (const h of horses) horsesMap[h.n] = h;

  return candidates.filter(bet => {
    const estPay = estimatePayout(bet, horsesMap);
    if (estPay === null) return true;
    return estPay >= bet.amount * EV_THRESHOLD;
  });
}

function extractNums(bet) {
  if (bet.nums) return bet.nums;
  const matches = (bet.horse || '').match(/#(\d+)/g) || [];
  return matches.map(s => parseInt(s.slice(1), 10));
}

function classifyChange(morningBets, newBets) {
  const mLen = morningBets.length;
  const nLen = newBets.length;

  if (mLen === 0 && nLen === 0) return 'no_change';
  if (mLen > 0 && nLen === 0) return 'reduced';
  if (mLen === 0 && nLen > 0) return 'expanded';

  const mNums = new Set(morningBets.flatMap(extractNums));
  const nNums = new Set(newBets.flatMap(extractNums));
  const same = [...mNums].every(n => nNums.has(n)) && [...nNums].every(n => mNums.has(n));

  return same ? 'no_change' : 'swapped';
}

function betToDisplay(bet, horsesMap) {
  const tc = TAG_MAP[bet.type] || 'fuku';
  if (bet.type === '三連複') {
    const nums = bet.nums.slice().sort((a,b)=>a-b);
    return {tag: 'sanfuku', label: '三連複(1点)', trio_type: 'list', nums: nums,
            combos: [nums.join('-')], est: '1点', amt: '¥' + bet.amount};
  }
  const names = bet.nums.map(n => {
    const h = horsesMap[n];
    return '#' + n + ' ' + (h ? h.name : '');
  }).join(' / ');
  let est;
  if (bet.type === '複勝') {
    const h = horsesMap[bet.nums[0]];
    est = (h && h.fukusho_odds) ? h.fukusho_odds.toFixed(1) + '倍' : '-';
  } else {
    const pay = estimatePayout(bet, horsesMap);
    est = pay ? (pay / 100).toFixed(1) + '倍' : '-';
  }
  return {tag: tc, label: bet.type, horse: names, est: est, amt: '¥' + bet.amount};
}

function buildValueChangeDetail(race) {
  if (!race._morning_ev) return '';
  let html = '<div style="font-size:10px;color:#666;padding:2px 0">';
  for (const h of (race.horses || [])) {
    const oldEv = race._morning_ev[h.n];
    const newEv = h.ev;
    if (oldEv != null && newEv != null && Math.abs(newEv - oldEv) >= 0.1) {
      const oldStr = oldEv.toFixed(2);
      const newStr = newEv.toFixed(2);
      const label = newEv >= 1.3 && oldEv < 1.3 ? '（出現！）'
                  : oldEv >= 1.3 && newEv < 1.3 ? '（消滅）' : '';
      html += '  #' + h.n + ' EV: ' + oldStr + ' → ' + newStr + label + '<br>';
    }
  }
  html += '</div>';
  return html;
}

  render();

function formationHtml(f) {
  if (!f) return '';
  const PAT_LABEL = {
    'A_1ax4box':  '軸1頭×4頭BOX',
    'B_standard': '軸1頭×2列×3列',
    'C_2ax5flow': '2頭軸×流し',
    'D_4box':     '4頭BOX',
    'E_1ax6box':  '軸1頭×6頭BOX',
  };
  const patLabel = PAT_LABEL[f.pattern] || 'フォーメーション';
  let h = '<div class="formation-box">';
  h += '<div class="formation-title">三連複 ' + patLabel
     + '（' + f.total_points + '点×¥100=¥' + f.total_amount.toLocaleString() + '）';
  if (f.syn_odds) h += ' <span style="background:#117a65;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px">合成' + f.syn_odds.toFixed(1) + '倍</span>';
  h += '</div>';

  if (f.axis) {
    const axLabel = f.axis2 ? '軸①' : '軸';
    h += '<div class="formation-row"><span class="row-label axis-label">' + axLabel + '</span>'
       + '<span class="axis-horse">#' + f.axis.num + ' ' + f.axis.name + '（' + f.axis.pop + '番人気）</span></div>';
  }
  if (f.axis2) {
    h += '<div class="formation-row"><span class="row-label axis-label">軸②</span>'
       + '<span class="axis-horse">#' + f.axis2.num + ' ' + f.axis2.name + '（' + f.axis2.pop + '番人気）</span></div>';
  }
  if (f.second_row && f.second_row.length > 0) {
    h += '<div class="formation-row"><span class="row-label second-label">2列</span>'
       + '<span>' + f.second_row.map(x => '#' + x.num + ' ' + x.name).join('、') + '</span></div>';
  }
  if (f.third_row && f.third_row.length > 0) {
    const isBox  = (f.pattern === 'D_4box');
    const isFlow = (f.pattern === 'C_2ax5flow' || (f.pattern === 'E_1ax6box'));
    const rowLbl = isBox ? 'BOX' : (isFlow ? '相手' : '3列');
    h += '<div class="formation-row"><span class="row-label third-label">' + rowLbl + '</span>'
       + '<span>' + f.third_row.map(x => '#' + x.num).join('、') + '</span></div>';
  }
  // Pattern D: axis_numsがないのでthird_rowに全頭入っている（上で表示済み）

  const pr = f.payout_range;
  const tierCount = {};
  for (const b of (f.bets || [])) tierCount[b.tier] = (tierCount[b.tier] || 0) + 1;
  const tierStr = Object.entries(tierCount).map(([k,v]) => k + v + '点').join(' / ');
  h += '<div class="formation-payout">';
  h += '想定配当: ¥' + pr.min.toLocaleString() + '〜¥' + pr.max.toLocaleString();
  if (tierStr) h += '　' + tierStr;
  h += '</div></div>';
  return h;
}

// ── 不利メモ入力（race_notes / スキーマ駆動） ─────────────────────────────
const NOTE_SCHEMA_URL = 'https://hanagenuku.github.io/keiba_ai/data/note_schema.json';
const NOTE_SCHEMA_URL_FALLBACK = 'https://raw.githubusercontent.com/hanagenuku/keiba_ai/main/data/note_schema.json';
let _noteSchema = null;

// race_id（20260622... 先頭YYYYMMDD）から YYYY-MM-DD を作る
function raceDateFromId(raceId) {
  const m = (raceId || '').match(/^(\d{4})(\d{2})(\d{2})/);
  return m ? (m[1] + '-' + m[2] + '-' + m[3]) : '';
}

async function fetchNoteSchema() {
  if (_noteSchema) return _noteSchema;
  let res = await fetch(NOTE_SCHEMA_URL + '?t=' + Date.now(), {cache:'no-store'});
  if (!res.ok) res = await fetch(NOTE_SCHEMA_URL_FALLBACK + '?t=' + Date.now(), {cache:'no-store'});
  if (!res.ok) throw new Error('note_schema.json が取得できません');
  _noteSchema = await res.json();
  return _noteSchema;
}

async function openNoteEditor(raceKey) {
  const race = findRace(raceKey);
  if (!race || !race.race_id) { alert('レースIDが見つかりません'); return; }
  let schema;
  try {
    schema = await fetchNoteSchema();
  } catch (err) {
    alert('スキーマ取得エラー: ' + err.message);
    return;
  }
  const horses = race.horses || [];
  const date = raceDateFromId(race.race_id);

  let opts = horses.map(h => '<option value="'+h.n+'">#'+h.n+' '+h.name+'</option>').join('');
  let html = '<div class="note-overlay" id="note-overlay" onclick="if(event.target===this)closeNoteEditor()">';
  html += '<div class="note-modal">';
  html += '<h3>📝 不利メモ（'+date+' '+(race.name||'')+'）</h3>';
  html += '<select class="note-sel" id="note-horse" onchange="onNoteHorseChange()">'+opts+'</select>';
  html += '<div id="note-form"></div>';
  html += '</div></div>';

  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstChild);

  // モーダルにレース情報を保持
  const ov = document.getElementById('note-overlay');
  ov._race = race; ov._date = date; ov._schema = schema;
  onNoteHorseChange();
}

function closeNoteEditor() {
  const ov = document.getElementById('note-overlay');
  if (ov) ov.remove();
}

async function onNoteHorseChange() {
  const ov = document.getElementById('note-overlay');
  if (!ov) return;
  const schema = ov._schema, race = ov._race, date = ov._date;
  const horseNum = parseInt(document.getElementById('note-horse').value, 10);
  const horse = (race.horses||[]).find(h => h.n === horseNum) || {};

  // 既存メモを取得（失敗しても空で続行）
  let existing = null;
  try {
    const url = GAS_URL + '?action=getNotes&date=' + encodeURIComponent(date)
              + '&race_id=' + encodeURIComponent(race.race_id)
              + '&horse_num=' + horseNum;
    const res = await fetch(url, {redirect:'follow'});
    const data = await res.json();
    if (data.status === 'ok') existing = data.note;
  } catch (e) { /* 既存取得失敗は無視 */ }

  const ex = existing && existing.notes_data ? existing.notes_data : {};
  let html = '';
  for (const cat of schema.categories) {
    html += '<div class="note-row"><label>'+cat.label+'</label><div class="note-options">';
    for (const opt of cat.options) {
      const checked = (ex[cat.id] === opt.value) ? 'checked' : '';
      html += '<label class="opt"><input type="radio" name="nt_'+cat.id+'" value="'+opt.value+'" '+checked
            + ' onchange="updateNotePreview()"><span>'+opt.label+'</span></label>';
    }
    html += '</div></div>';
  }
  if (schema.free_memo) {
    html += '<div class="note-row"><label>メモ</label><textarea class="note-memo" id="note-free">'
          + (existing && existing.free_memo ? existing.free_memo : '') + '</textarea></div>';
  }
  html += '<div class="note-preview">補正値: <span id="note-hcap">0</span></div>';
  html += '<div class="note-actions">';
  html += '<button class="note-cancel" onclick="closeNoteEditor()">閉じる</button>';
  html += '<button class="note-save" id="note-save-btn" onclick="saveNote(this)">保存 #'+horseNum+' '+(horse.name||'')+'</button>';
  html += '</div>';
  document.getElementById('note-form').innerHTML = html;
  updateNotePreview();
}

function collectNoteValues() {
  const ov = document.getElementById('note-overlay');
  const schema = ov._schema;
  const notes = {};
  let total = 0;
  for (const cat of schema.categories) {
    const sel = document.querySelector('input[name="nt_'+cat.id+'"]:checked');
    if (sel) {
      const v = parseFloat(sel.value);
      notes[cat.id] = v;
      if (cat.feature) total += v * (cat.weight || 1.0);
    }
  }
  return { notes, total: Math.round(total * 100) / 100 };
}

function updateNotePreview() {
  const el = document.getElementById('note-hcap');
  if (el) el.textContent = collectNoteValues().total;
}

async function saveNote(btn) {
  const ov = document.getElementById('note-overlay');
  const race = ov._race, date = ov._date;
  const horseNum = parseInt(document.getElementById('note-horse').value, 10);
  const horse = (race.horses||[]).find(h => h.n === horseNum) || {};
  const { notes } = collectNoteValues();
  const freeEl = document.getElementById('note-free');
  const freeMemo = freeEl ? freeEl.value : '';

  btn.disabled = true; const orig = btn.textContent; btn.textContent = '保存中...';
  try {
    const url = GAS_URL + '?action=saveNote'
      + '&date=' + encodeURIComponent(date)
      + '&race_id=' + encodeURIComponent(race.race_id)
      + '&racecourse=' + encodeURIComponent(venue || '')
      + '&race_num=' + encodeURIComponent(race.r || '')
      + '&horse_num=' + horseNum
      + '&horse_name=' + encodeURIComponent(horse.name || '')
      + '&notes_data=' + encodeURIComponent(JSON.stringify(notes))
      + '&free_memo=' + encodeURIComponent(freeMemo);
    const res = await fetch(url, {redirect:'follow'});
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || '保存失敗');
    btn.textContent = '✓ 保存しました';
    setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 1200);
  } catch (err) {
    alert('保存エラー: ' + err.message);
    btn.disabled = false; btn.textContent = orig;
  }
}

// ── ページ切り替え ───────────────────────────────────────────────────────
let _currentPage = 'predict';

function switchPage(page) {
  _currentPage = page;
  document.getElementById('page-predict').style.display = page === 'predict' ? '' : 'none';
  document.getElementById('page-stats').style.display   = page === 'stats'   ? '' : 'none';
  document.getElementById('nav-predict').classList.toggle('on', page === 'predict');
  document.getElementById('nav-stats').classList.toggle('on', page === 'stats');
  if (page === 'stats') loadStats();
}

// ── 成績ページ ───────────────────────────────────────────────────────────
let _statsCache = null;

async function loadStats() {
  const el = document.getElementById('page-stats');
  if (_statsCache) { renderStats(_statsCache); return; }
  el.innerHTML = '<div class="loading"><div class="loading-spin">📊</div><div>成績データ読み込み中...</div></div>';
  try {
    let res = await fetch(STATS_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!res.ok) res = await fetch(STATS_URL_FALLBACK + '?t=' + Date.now(), {cache:'no-store'});
    if (!res.ok) throw new Error('stats.json が見つかりません（まだ生成されていません）');
    _statsCache = await res.json();
    renderStats(_statsCache);
  } catch(e) {
    el.innerHTML = '<div class="error-box">⚠️ ' + e.message + '<br><br>土曜/日曜結果を取得すると自動生成されます。</div>';
  }
}

function renderStats(S) {
  const el = document.getElementById('page-stats');
  let h = '';

  // ── 結果取得ステータス ───────────────────────────────────────────────
  const rs = S.results_status || {};
  const rsDate  = rs.last_date || null;
  const rsRaces = rs.races || 0;
  const rsVenues = rs.venues || [];
  const rsRunAt  = rs.workflow_run_at || null;
  const rsResult = rs.workflow_result || null;

  h += '<div class="stat-card"><div class="stat-title">📡 最終結果取得状況</div>';
  if (rsDate) {
    h += `<div class="stat-row"><span class="stat-key">最終保存日</span><span class="stat-val">${rsDate}</span></div>`;
    h += `<div class="stat-row"><span class="stat-key">取得レース数</span><span class="stat-val">${rsRaces}R</span></div>`;
    if (rsVenues.length) {
      const vStr = rsVenues.map(v => `${v.name}(${v.races}R)`).join('&nbsp; ');
      h += `<div class="stat-row"><span class="stat-key">取得会場</span><span class="stat-val" style="font-size:11px">${vStr}</span></div>`;
    }
  } else {
    h += '<div style="color:var(--sub);font-size:12px">結果未取得</div>';
  }
  if (rsRunAt) {
    const jstMs = new Date(rsRunAt).getTime() + 9 * 3600 * 1000;
    const jstStr = new Date(jstMs).toISOString().replace('T',' ').slice(0,16) + ' JST';
    const isOk = rsResult === 'success' && rsRaces > 0;
    const statusLabel = rsRaces > 0 ? '✅ 取得成功' : '⚠️ 取得失敗（0R）';
    h += `<div class="stat-row"><span class="stat-key">最終実行</span><span class="stat-val" style="font-size:11px">${jstStr}</span></div>`;
    h += `<div class="stat-row"><span class="stat-key">実行結果</span><span class="stat-val ${isOk?'pos':'neg'}">${statusLabel}</span></div>`;
  }
  h += '</div>';

  // ── RL精度 ──────────────────────────────────────────────────────────
  const rl = S.rl_accuracy || {};
  h += '<div class="stat-card"><div class="stat-title">🎯 RL予測精度（全レース）</div>';
  if (rl.total_races > 0) {
    h += `<div style="font-size:11px;color:var(--sub);margin-bottom:8px">集計対象: ${rl.total_races}レース</div>`;
    h += '<div class="rl-grid">';
    h += _rlCell('RL1位 勝率', rl.rl1_win_rate + '%');
    h += _rlCell('RL1位 3着内', rl.rl1_top3_rate + '%');
    h += _rlCell('RL2位 3着内', rl.rl2_top3_rate + '%');
    h += _rlCell('RL3位 3着内', rl.rl3_top3_rate + '%');
    h += '</div>';
    // 波乱度別
    if (rl.by_chaos && Object.keys(rl.by_chaos).length) {
      h += '<div style="margin-top:10px;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px">波乱度別 RL1位成績</div>';
      const gradeLabel = {A:'堅い',B:'中荒れ',C:'大荒れ'};
      const gradeColor = {A:'#2980b9',B:'#e67e22',C:'#c0392b'};
      for (const [g, d] of Object.entries(rl.by_chaos)) {
        h += `<div class="stat-row"><span class="stat-key"><span style="background:${gradeColor[g]||'#999'};color:#fff;font-size:9px;padding:1px 5px;border-radius:3px">${g} ${gradeLabel[g]||''}</span> ${d.total}R</span>`;
        h += `<span class="stat-val">勝率${d.rl1_win_rate}% / 3着内${d.rl1_top3_rate}%</span></div>`;
      }
    }
  } else {
    h += '<div style="color:var(--sub);font-size:12px">データ蓄積中（土日結果取得後に表示されます）</div>';
  }
  h += '</div>';

  // ── 券種別実績 ──────────────────────────────────────────────────────
  const byType = S.by_type || [];
  h += '<div class="stat-card"><div class="stat-title">💴 券種別実績</div>';
  if (byType.length) {
    for (const t of byType) {
      const roi = t.roi;
      const barW = Math.min(100, Math.abs(roi - 100));
      h += `<div style="margin-bottom:8px">`;
      h += `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">`;
      h += `<span style="font-weight:700">${t.type}</span>`;
      h += `<span style="color:var(--sub)">${t.hit}/${t.total}件 (${t.hit_rate}%)</span>`;
      h += `<span class="stat-val ${roi>=100?'pos':'neg'}">${roi}%</span></div>`;
      h += `<div class="roi-bar-wrap"><div class="roi-bar ${roi<100?'neg':''}" style="width:${Math.min(100,roi)}%"></div></div>`;
      h += `<div style="font-size:10px;color:var(--sub)">投資¥${t.invested.toLocaleString()} / 回収¥${t.recovered.toLocaleString()}</div>`;
      h += '</div>';
    }
  } else {
    h += '<div style="color:var(--sub);font-size:12px">データなし</div>';
  }
  h += '</div>';

  // ── 月別ROI ─────────────────────────────────────────────────────────
  const weekly = S.weekly_roi || [];
  h += '<div class="stat-card"><div class="stat-title">📈 月別ROI</div>';
  if (weekly.length) {
    for (const w of [...weekly].reverse()) {
      const roi = w.roi;
      h += `<div class="stat-row">`;
      h += `<span class="stat-key">${w.month}</span>`;
      h += `<span style="font-size:11px;color:var(--sub)">${w.hit}/${w.total}件</span>`;
      h += `<span class="stat-val ${roi>=100?'pos':'neg'}">${roi}%</span>`;
      h += '</div>';
    }
  } else {
    h += '<div style="color:var(--sub);font-size:12px">データなし</div>';
  }
  h += '</div>';

  // ── AIの盲点パターン ─────────────────────────────────────────────────
  const up = S.upset_patterns || {};
  h += '<div class="stat-card"><div class="stat-title">🔍 AIの盲点パターン（穴馬が来やすい条件）</div>';
  if ((up.total_races || 0) < 5) {
    h += '<div style="color:var(--sub);font-size:12px">データ蓄積中（土日結果が増えると自動表示されます）</div>';
  } else {
    h += `<div style="font-size:11px;color:var(--sub);margin-bottom:10px">集計対象: ${up.total_races}レース　全体AI外れ率: <strong>${up.overall_upset_rate}%</strong>（AI上位3頭の外に馬券内馬が出た割合）</div>`;

    // 盲点ランキング（複合条件）
    if ((up.blind_spots || []).length) {
      h += '<div style="font-size:11px;font-weight:700;color:#c0392b;margin-bottom:6px">⚠️ 要注意パターン（AI外れ率 高い順）</div>';
      h += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
      h += '<tr style="background:var(--g1);color:#fff"><th style="padding:4px 6px;text-align:left">条件</th><th style="padding:4px;text-align:center">件数</th><th style="padding:4px;text-align:center">AI外れ率</th><th style="padding:4px;text-align:center">全滅率</th><th style="padding:4px;text-align:center">穴馬率</th></tr>';
      for (const b of (up.blind_spots || [])) {
        const danger = b.upset_rate >= 70 ? '#c0392b' : b.upset_rate >= 55 ? '#e67e22' : '#2c3e50';
        h += `<tr style="border-bottom:1px solid #f0ece4">`;
        h += `<td style="padding:5px 6px;font-weight:600">${b.label}</td>`;
        h += `<td style="padding:5px 4px;text-align:center;color:var(--sub)">${b.total}R</td>`;
        h += `<td style="padding:5px 4px;text-align:center;font-weight:800;color:${danger}">${b.upset_rate}%</td>`;
        h += `<td style="padding:5px 4px;text-align:center;color:#c0392b">${b.full_miss_rate}%</td>`;
        h += `<td style="padding:5px 4px;text-align:center;color:#8e44ad">${b.longshot_rate}%</td>`;
        h += '</tr>';
      }
      h += '</table><div style="font-size:10px;color:var(--sub);margin-top:4px">穴馬率 = 10倍超の馬が勝ちかつAI外だった割合</div>';
    }

    // 波乱度別
    h += '<div style="margin-top:12px;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px">波乱度別 AI外れ率</div>';
    const gradeColor2 = {A:'#2980b9', B:'#e67e22', C:'#c0392b'};
    for (const g of (up.by_chaos || [])) {
      const gc = gradeColor2[g.label] || '#999';
      h += `<div class="stat-row"><span class="stat-key"><span style="background:${gc};color:#fff;font-size:9px;padding:1px 5px;border-radius:3px">${g.label}</span> ${g.total}R</span>`;
      h += `<span class="stat-val" style="color:${g.upset_rate>=70?'#c0392b':g.upset_rate>=50?'#e67e22':'#27ae60'}">外れ${g.upset_rate}% / 全滅${g.full_miss_rate}%</span></div>`;
    }

    // 芝/ダート・距離・頭数を横並びに
    const _dimRows = [
      {title:'馬場別', data: up.by_surface},
      {title:'距離別', data: up.by_distance},
      {title:'頭数別', data: up.by_heads},
      {title:'会場別', data: up.by_racecourse},
    ];
    h += '<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    for (const dim of _dimRows) {
      h += `<div><div style="font-size:10px;font-weight:700;color:var(--sub);margin-bottom:4px">${dim.title}</div>`;
      for (const g of (dim.data || [])) {
        h += `<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #f0ece4">`;
        h += `<span style="color:var(--text)">${g.label}</span>`;
        h += `<span style="font-weight:700;color:${g.upset_rate>=70?'#c0392b':g.upset_rate>=50?'#e67e22':'#555'}">${g.upset_rate}%</span>`;
        h += `</div>`;
      }
      h += '</div>';
    }
    h += '</div>';
  }
  h += '</div>';

  // ── 直近レース一覧 ───────────────────────────────────────────────────
  const recent = S.recent_races || [];
  h += '<div class="stat-card"><div class="stat-title">📋 直近レース（RL vs 実着順）</div>';
  if (recent.length) {
    h += '<div style="overflow-x:auto"><table class="rtbl">';
    h += '<tr><th>日付</th><th>会場</th><th>R</th><th>波</th><th>RL1</th><th>RL2</th><th>RL3</th><th>1着</th><th>2着</th><th>3着</th><th>複</th><th>推</th></tr>';
    for (const r of recent) {
      const top3 = new Set([r.win, r.sec, r.thr]);
      const rl1ok = top3.has(r.rl1);
      const rl1win = r.rl1 === r.win;
      const gradeColor = {A:'#2980b9',B:'#e67e22',C:'#c0392b'}[r.chaos] || '#999';
      h += `<tr class="${rl1ok?'hit':''}">`;
      h += `<td>${(r.date||'').slice(5)}</td>`;
      h += `<td>${r.racecourse||''}</td>`;
      h += `<td>${r.race_num}</td>`;
      h += `<td><span style="background:${gradeColor};color:#fff;font-size:9px;padding:1px 4px;border-radius:2px">${r.chaos||'?'}</span></td>`;
      h += `<td style="font-weight:800;color:${rl1win?'#27ae60':rl1ok?'#e67e22':'#c0392b'}">#${r.rl1||'-'}</td>`;
      h += `<td class="${top3.has(r.rl2)?'hit-mark':'miss'}">#${r.rl2||'-'}</td>`;
      h += `<td class="${top3.has(r.rl3)?'hit-mark':'miss'}">#${r.rl3||'-'}</td>`;
      h += `<td style="font-weight:800">#${r.win||'-'}</td>`;
      h += `<td>#${r.sec||'-'}</td>`;
      h += `<td>#${r.thr||'-'}</td>`;
      h += `<td>${r.fuku_hit?'<span class="hit-mark">○</span>':'<span class="miss-mark">✗</span>'}</td>`;
      h += `<td>${r.rec?'⭐':''}</td>`;
      h += '</tr>';
    }
    h += '</table></div>';
    if (S.generated_at) h += `<div style="font-size:10px;color:var(--sub);margin-top:6px;text-align:right">更新: ${S.generated_at}</div>`;
  } else {
    h += '<div style="color:var(--sub);font-size:12px">データなし（土日結果取得後に表示されます）</div>';
  }
  h += '</div>';

  el.innerHTML = h;
}

function _rlCell(label, val) {
  return `<div class="rl-cell"><div class="rl-cell-label">${label}</div><div class="rl-cell-val">${val}</div></div>`;
}

loadData().then(() => _restorePolling());
</script>
